<!DOCTYPE html>
<html lang="{{ locale() }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ t("common.site_name") }}{% endblock %}</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', path='favicon.png') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Source+Serif+4:opsz,wght@8..60,500;8..60,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>
<body>
  {% set current_path = request.url.path ~ ('?' ~ request.url.query if request.url.query else '') %}
  <div class="page-bg"></div>
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="/" class="brand">{{ t("common.site_name") }}</a>
      <div class="topbar-actions">
        <form method="post" action="/language" class="lang-form">
          <input type="hidden" name="next" value="{{ current_path }}">
          <label for="locale-switch" class="sr-only">{{ t("common.language") }}</label>
          <select id="locale-switch" name="locale" class="lang-select" onchange="this.form.submit()">
            {% for item in locale_options() %}
            <option value="{{ item.code }}" {% if item.code == locale() %}selected{% endif %}>{{ item.label }}</option>
            {% endfor %}
          </select>
        </form>
        {% if user %}
        <div class="user-menu">
          <span class="user-email">{{ user.email }}</span>
          <form method="post" action="/logout">
            <button type="submit" class="btn btn-outline">{{ t("common.logout") }}</button>
          </form>
        </div>
        {% endif %}
      </div>
    </div>
  </header>

  <main class="container page-shell">
    {% block content %}{% endblock %}
  </main>

  <script>
    window.PORTAL_LOCALE = {{ locale()|tojson }};
    window.PORTAL_I18N = {{ client_i18n()|tojson }};
  </script>
</body>
</html>
