{% extends "base.html" %}
{% block title %}{{ t("register.page_title") }}{% endblock %}
{% block content %}
<section class="auth-wrap">
  <article class="card auth-card">
    <h1>{{ t("register.heading") }}</h1>
    <p class="muted">{{ t("register.subtitle") }}</p>
    {% if error %}
    <div class="alert alert-error">{{ t(error) }}</div>
    {% endif %}
    <form method="post" action="/register" class="form-stack">
      <label>{{ t("register.email") }}</label>
      <input type="email" name="email" required placeholder="you@example.com">
      <label>{{ t("register.password") }}</label>
      <input type="password" name="password" required placeholder="{{ t('register.password_placeholder') }}">
      <label>{{ t("register.confirm_password") }}</label>
      <input type="password" name="confirm_password" required placeholder="{{ t('register.confirm_password_placeholder') }}">
      <button type="submit" class="btn btn-primary">{{ t("register.submit") }}</button>
    </form>
    <p class="muted">{{ t("register.have_account") }} <a href="/login">{{ t("register.login") }}</a></p>
  </article>
</section>
{% endblock %}
