{% extends "base.html" %}
{% block title %}{{ t("login.page_title") }}{% endblock %}
{% block content %}
<section class="auth-wrap">
  <article class="card auth-card">
    <h1>{{ t("login.heading") }}</h1>
    <p class="muted">{{ t("login.subtitle") }}</p>
    {% if error %}
    <div class="alert alert-error">{{ t(error) }}</div>
    {% endif %}
    <form method="post" action="/login" class="form-stack">
      <label>{{ t("login.email") }}</label>
      <input type="email" name="email" required placeholder="you@example.com">
      <label>{{ t("login.password") }}</label>
      <input type="password" name="password" required placeholder="{{ t('login.password_placeholder') }}">
      <button type="submit" class="btn btn-primary">{{ t("login.submit") }}</button>
    </form>
    <p class="muted">{{ t("login.no_account") }} <a href="/register">{{ t("login.create_one") }}</a></p>
  </article>
</section>
{% endblock %}
